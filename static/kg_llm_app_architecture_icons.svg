<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A user asks the Streamlit app a plain-language question. The app hands it to Gemini, which queries the Neo4j AuraDB knowledge graph, gets structured data back, drafts a natural-language reply, and the app returns the answer to the user.</desc>
